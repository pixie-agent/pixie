name: Bug report
description: Report something that is broken or behaves unexpectedly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug! A little detail goes a long way.
        Pixie drives the Claude Code CLI, so the CLI version and your OS usually matter.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: The smallest set of steps that triggers the bug.
      placeholder: |
        1. Add workspace '...'
        2. Send the message '...'
        3. Click '...'
        4. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen instead.
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "e.g. macOS 14.4, Windows 11, Ubuntu 24.04"
    validations:
      required: true
  - type: input
    id: claude-version
    attributes:
      label: Claude CLI version
      description: Output of `claude --version`
      placeholder: "claude x.y.z"
    validations:
      required: true
  - type: input
    id: pixie-version
    attributes:
      label: Pixie version
      description: The version shown in the bundle, or "dev" if running from source.
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: |
        Run with `pnpm tauri dev` to see backend (Rust) logs in the terminal.
        Paste anything relevant, and attach screenshots if it helps.
      render: shell
